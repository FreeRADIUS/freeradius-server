<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>cest-analyzer (WASM)</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>cest-analyzer</h1>
    <p>Callgrind CEst analysis in the browser. Everything runs locally via
       WebAssembly; no file leaves your machine.</p>
  </header>

  <main>
    <section class="controls">
      <div class="runs-head">
        <span class="runs-title">Profiling runs</span>
        <p class="hint">Each run is one directory's callgrind.out.* files. Add a
           second run to get a comparison footer (first run is the baseline).</p>
      </div>

      <!-- Run rows are added here by app.js; one empty row is created on load. -->
      <div id="runs"></div>

      <div class="toolbar-left">
        <button id="add-run" type="button" class="secondary">+ Add run</button>
      </div>

      <label>
        Patterns (space-separated, case-insensitive)
        <input id="patterns" type="text" value="memset rbtree" placeholder="memset rbtree sha256">
      </label>

      <label>
        Top-N per pattern
        <input id="topn" type="number" value="10" min="1" max="100">
      </label>

      <button id="run" disabled>Loading WASM…</button>
    </section>

    <!-- Cloned by app.js for each run. Kept in the DOM (hidden) as the source. -->
    <template id="run-row">
      <div class="run-row">
        <label class="run-label">
          Run label
          <input type="text" class="run-label-input" placeholder="baseline">
        </label>
        <label class="run-files">
          callgrind.out.* files
          <input type="file" class="run-files-input" multiple>
        </label>
        <button type="button" class="remove-run secondary" title="Remove this run">✕</button>
      </div>
    </template>

    <section id="output" hidden>
      <div class="toolbar">
        <button id="download" type="button">Download Markdown report</button>
      </div>
      <pre id="report"></pre>
    </section>

    <p id="error" class="error" hidden></p>
  </main>

  <script src="wasm_exec.js"></script>
  <script src="app.js"></script>
</body>
</html>
