#
#  Reproduce GH#5846: server only loads EAP-AKA, supplicant prefers PEAP and
#  NAKs the AKA proposal. The NAK proposes a method (PEAP, type 25) that the
#  server has not loaded. With ignore_unknown_eap_types = no the server
#  rejects the request, then aborts during request slab cleanup.
#
#  The `fail-` filename prefix tells the harness eapol_test is expected to
#  fail; the server must not crash. radiusd_stop verifies the daemon is
#  still alive at the end of the run.
#
network={
        ssid="testing123"
        key_mgmt=WPA-EAP IEEE8021X
        eap=PEAP
        identity="010026000000000@wlan.mnc11343.mcc0.3gppnetwork.org"
        password="whatever"
        phase2="auth=MSCHAPV2"
}
