# Topology
compose_num_of_home_servers: 5
compose_num_of_proxy_servers: 0
listener_type: file

# Routing
load_gen_num_of_dst_servers: 5
load_gen_dst_server_name: homeserver

# Load generator profile
loadgen:
  start_pps: 5
  max_pps: 10
  duration: 5
  step: 5
  parallel: 1
  max_backlog: 1000
  repeat: "no"

# Test framework
test_timeout: 50
test_verify_timeout: 40
