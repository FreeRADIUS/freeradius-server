# Topology
compose_num_of_home_servers: 5
compose_num_of_proxy_servers: 0
listener_type: file

# Routing
load_gen_num_of_dst_servers: 5
load_gen_dst_server_name: homeserver

# Load profile
test_conf_start_pps: 5
test_conf_max_pps: 50
test_conf_duration: 300
test_conf_step: 5
test_conf_parallel: 1
test_conf_max_backlog: 1000
test_conf_repeat: "no"

# Test framework
test_timeout: 350
test_verify_timeout: 340
