#
#  Minimal radiusd.conf for testing keywords
#

raddb		= raddb
dir		= src/tests/config/modules
logdir		= build/tests/config/

modconfdir	= ${raddb}/mods-config

#  Only for testing!
#  Setting this on a production system is a BAD IDEA.
security {
	allow_vulnerable_openssl = yes
	allow_core_dumps = yes
}

modules {
	$INCLUDE ${raddb}/mods-enabled/always
	
	$INCLUDE ${dir}/$ENV{CONFIG_FILE}
}

policy {
	accept {
		reply.Packet-Type := ::Access-Accept
		handled
	}
}

#
#  Virtual server for the RADIUS protocol.
#
server default {
	namespace = radius

	recv Access-Request {
		accept
	}

}
