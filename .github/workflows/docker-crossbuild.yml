name: Docker crossbuild images

on:
  push:
    branches-ignore:
      - coverity_scan
  workflow_dispatch:

env:
  CI: 1
  GH_ACTIONS: 1
  DEBIAN_FRONTEND: noninteractive
  APT_OPTS: "-y --no-install-recommends"

jobs:
  #
  #  Generate matrix based on crossbuild docker directories.
  #
  gen-matrix:

    runs-on: ubuntu-latest

    outputs:
      matrix: ${{ steps.gen-matrix.outputs.matrix }}

    steps:

    - uses: actions/checkout@v6
      with:
        lfs: false

    - id: gen-matrix
      name: Generate matrix based on crossbuild targets
      run: |
        cd scripts/docker/build
        M=$(ls | perl -n -e '{chomp; push @L,"\"$_\""} END{print "{\"env\":[{\"OS\":",join("},{\"OS\":",@L),"}]}"}')
        echo "Matrix: $M"
        echo matrix=$M >> $GITHUB_OUTPUT

  #
  #  Self-hosted variant: runs on the FreeRADIUS Proxmox fleet inside
  #  the self-hosted-docker-cli image and talks to a self-hosted-docker-dind
  #  sidecar (registry-mirror -> internal NR cache, internal CA pre-trusted).
  #
  crossbuild-selfhosted:
    needs:
      - gen-matrix

    if: github.repository_owner == 'FreeRADIUS'

    runs-on: self-hosted

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.gen-matrix.outputs.matrix) }}

    env: ${{ matrix.env }}

    name: "${{ github.workflow }}-${{ matrix.env.OS }}"

    services:
      dind:
        #
        #  Custom dind image with /etc/docker/daemon.json baked in
        #  pointing at the internal NR registry as a Docker Hub
        #  pull-through mirror, and the internal CA pre-trusted.
        #
        image: docker.internal.networkradius.com/self-hosted-docker-dind
        options: --privileged
        env:
          DOCKER_TLS_CERTDIR: ""
          #  Bypass the squid proxy for internal registry access.
          NO_PROXY: "*.networkradius.com,127.0.0.1"
        #
        #  Share the runner's workspace with dind so the build
        #  context resolves to real files inside the dind daemon
        #  and the inner `docker run --mount=type=bind,source=...`
        #  bind-mount of the source tree resolves the same way in
        #  both containers.
        #
        #  github.workspace is the HOST path to the workspace. The
        #  runner mounts it into the job container at a different
        #  path (/__w/...), so we use a fixed mount point
        #  (/workspace) that both containers agree on.
        #
        volumes:
          - ${{ github.workspace }}:/workspace

    container:
      #
      #  Custom CI image with docker CLI / buildx / m4 baked on top
      #  of the self-hosted base.
      #
      image: docker.internal.networkradius.com/self-hosted-docker-cli
      env:
        DOCKER_HOST: tcp://dind:2375
        NO_PROXY: dind,*.networkradius.com,127.0.0.1
      #  CA cert mount lets the in-container apt and curl talk HTTPS
      #  to docker.internal.networkradius.com. Shared workspace - see
      #  dind volumes comment above.
      volumes:
        - /usr/local/share/ca-certificates/networkradius.com.crt:/usr/local/share/ca-certificates/networkradius.com.crt:ro
        - ${{ github.workspace }}:/workspace

    defaults:
      run:
        working-directory: /workspace

    steps:

    - uses: actions/checkout@v6
      with:
        fetch-depth: 0${{ ( matrix.env.OS != 'centos7' ) && '1' }}
        lfs: false

    - name: setup-dind
      uses: ./.github/actions/setup-dind

    #
    #  The dind sidecar has its own dockerd that's not pre-authenticated
    #  to docker.internal.networkradius.com (the host docker daemon on
    #  the self-hosted runner is, via the runner's job-started hook,
    #  but that auth doesn't propagate into the dind container). Log in
    #  explicitly so the inner crossbuild's FROM-pull of self-hosted-*
    #  works instead of 401-ing.
    #
    - name: Login to internal Docker registry (via dind)
      env:
        DOCKER_USERNAME: ${{ secrets.DOCKER_REPO_USERNAME }}
        DOCKER_PASSWORD: ${{ secrets.DOCKER_REPO_PASSWORD }}
      run: |
        echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin https://docker.internal.networkradius.com/

    #
    #  Run the per-distro crossbuild. CB_FROM_<distro> overrides the
    #  `from` build-arg in scripts/docker/crossbuild.mk so the inner
    #  docker build FROMs an internal base image instead of docker.io,
    #  killing the Hub pull (and the anonymous rate-limit headache) on
    #  every CI run. Local `make crossbuild.<distro>` ignores these
    #  and uses the upstream image baked into Dockerfile.crossbuild by m4.
    #
    - name: Run crossbuild tests
      env:
        CB_FROM_debian12:  docker.internal.networkradius.com/self-hosted-deb-debian12
        CB_FROM_debian13:  docker.internal.networkradius.com/self-hosted-deb-debian13
        CB_FROM_debiansid: docker.internal.networkradius.com/self-hosted-deb-debiansid
        CB_FROM_ubuntu22:  docker.internal.networkradius.com/self-hosted-deb-ubuntu22
        CB_FROM_ubuntu24:  docker.internal.networkradius.com/self-hosted-deb-ubuntu24
        CB_FROM_ubuntu26:  docker.internal.networkradius.com/self-hosted-deb-ubuntu26
        CB_FROM_rocky9:    docker.internal.networkradius.com/self-hosted-rocky9
        CB_FROM_rocky10:   docker.internal.networkradius.com/self-hosted-rocky10
      run: |
        make dockerfile.crossbuild.check
        make crossbuild.$OS

    #
    #  No push step here. crossbuild:latest is published by
    #  docker-refresh.yml on its periodic schedule. This workflow is
    #  a per-commit sanity test - it builds crossbuild and runs FR's
    #  in-container test suite against the working source, then the
    #  per-job dind sidecar tears down with the :<sha> image inside.

    - name: Show build log
      if: ${{ success() || failure() }}
      run: |
        cat build/docker/build.$OS.crossbuild

    - name: Show configure log
      if: ${{ success() || failure() }}
      run: |
        cat build/docker/configure.$OS.crossbuild

    - name: Show test log
      if: ${{ success() || failure() }}
      run: |
        cat build/docker/test.$OS.crossbuild

    #
    #  If the CI has failed and the branch is ci-debug then start a tmate
    #  session. SSH rendezvous point is emited continuously in the job output.
    #
    - name: "Debug: Start tmate"
      uses: mxschmitt/action-tmate@v3
      with:
        limit-access-to-actor: true
      if: ${{ github.ref == 'refs/heads/ci-debug' && failure() }}

  #
  #  Public variant: runs on GitHub-hosted runners (fork pushes). Uses
  #  the public docker:dind sidecar and a plain ubuntu:24.04 job
  #  container - no internal registry or CA involvement.
  #
  crossbuild-public:
    needs:
      - gen-matrix

    if: github.repository_owner != 'FreeRADIUS'

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.gen-matrix.outputs.matrix) }}

    env: ${{ matrix.env }}

    name: "${{ github.workflow }}-${{ matrix.env.OS }}"

    services:
      dind:
        image: docker:dind
        #
        #  No credentials: block here - this variant runs on fork CI
        #  where the org-level DOCKERHUB_READ_* vars/secrets aren't
        #  available, and a credentials: block with empty values fails
        #  workflow template validation. The host docker daemon does
        #  an anonymous pull of docker:dind here; GH-hosted runners
        #  have many egress IPs so the per-IP Hub limit is rarely an
        #  issue for fork builds.
        #
        options: --privileged
        env:
          DOCKER_TLS_CERTDIR: ""
        #  Share the runner's workspace with dind so the build
        #  context resolves to real files inside the dind daemon
        #  and the inner `docker run --mount=type=bind,source=...`
        #  bind-mount of the source tree resolves the same way in
        #  both containers.
        #
        #  github.workspace is the HOST path to the workspace. The
        #  runner mounts it into the job container at a different
        #  path (/__w/...), so we use a fixed mount point
        #  (/workspace) that both containers agree on.
        volumes:
          - ${{ github.workspace }}:/workspace

    container:
      image: ubuntu:24.04
      env:
        DOCKER_HOST: tcp://dind:2375
      #  Shared workspace — see dind volumes comment above.
      volumes:
        - ${{ github.workspace }}:/workspace

    defaults:
      run:
        working-directory: /workspace

    steps:

    #
    #  actions/checkout falls back to a tarball download (no .git) when
    #  git isn't on PATH; the Dockerfile's `git clean -fdxx` then fails
    #  inside the build. ubuntu:24.04 ships without git, so install it
    #  before checkout. Harmless on the self-hosted CI image where git
    #  is already present.
    #
    - name: Ensure git is available for checkout
      run: apt-get update && apt-get install -y --no-install-recommends git ca-certificates

    - uses: actions/checkout@v6
      with:
        fetch-depth: 0${{ ( matrix.env.OS != 'centos7' ) && '1' }}
        lfs: false

    - name: setup-dind
      uses: ./.github/actions/setup-dind
      with:
        packages: m4 make

    - name: Run crossbuild tests
      run: |
        make dockerfile.crossbuild.check
        make crossbuild.$OS

    - name: Show build log
      if: ${{ success() || failure() }}
      run: |
        cat build/docker/build.$OS.crossbuild

    - name: Show configure log
      if: ${{ success() || failure() }}
      run: |
        cat build/docker/configure.$OS.crossbuild

    - name: Show test log
      if: ${{ success() || failure() }}
      run: |
        cat build/docker/test.$OS.crossbuild

    #
    #  If the CI has failed and the branch is ci-debug then start a tmate
    #  session. SSH rendezvous point is emited continuously in the job output.
    #
    - name: "Debug: Start tmate"
      uses: mxschmitt/action-tmate@v3
      with:
        limit-access-to-actor: true
      if: ${{ github.ref == 'refs/heads/ci-debug' && failure() }}
