name: Prune CI Docker images

#
#  Periodic cleanup for ci-ttl-labeled images in the internal Docker
#  registry. The scripts/docker pipeline tags every image it builds
#  with a ci-ttl=<duration> label (see scripts/docker/docker.mk:
#  DOCKER_BUILD). docker-server.yml + docker-crossbuild.yml push those
#  tagged images to docker.internal.networkradius.com, where they
#  accumulate one tag per commit until something cleans them up.
#
#  Each pass walks the registry's catalog, fetches the OCI image
#  config for every tag under the freeradius4-* namespaces to recover
#  the ci-ttl label and creation timestamp, computes age vs TTL, and
#  issues DELETE /v2/<name>/manifests/<digest> for anything past its
#  deadline. The actual disk reclamation needs the registry-side
#  garbage collector to run afterwards; that's configured separately
#  on the registry host (`registry garbage-collect`).
#
#  Cadence is every 30 minutes - same trade-off as before: tighten
#  for disk pressure, lengthen if the prune itself starts interfering
#  with concurrent pushes.
#

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  prune:
    if: github.repository_owner == 'FreeRADIUS'
    runs-on: self-hosted

    container:
      #
      #  Custom CI image with curl + jq baked on top of the self-hosted
      #  base. CA mount lets curl talk HTTPS to
      #  docker.internal.networkradius.com without -k.
      #
      image: docker.internal.networkradius.com/self-hosted-docker-cli
      volumes:
        - /usr/local/share/ca-certificates/networkradius.com.crt:/usr/local/share/ca-certificates/networkradius.com.crt:ro

    steps:
      - name: Update CA certificates
        run: /usr/sbin/update-ca-certificates 2>/dev/null || true

      - name: Prune expired ci-ttl images from internal registry
        shell: bash
        env:
          REGISTRY: docker.internal.networkradius.com
          DOCKER_USERNAME: ${{ secrets.DOCKER_REPO_UPDATE_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_REPO_UPDATE_PASSWORD }}
        run: |
          set -euo pipefail

          which jq >/dev/null 2>&1 || apt-get -qq update >/dev/null && apt-get -y install jq >/dev/null

          #
          #  Convert a go-style duration string into seconds.
          #  Accepts <number><unit> where unit is one of s / m / h / d.
          #  Anything else exits non-zero so the caller can skip the image.
          #
          ttl_to_seconds() {
            local v=$1
            local n=${v%[a-zA-Z]*}
            local u=${v##*[0-9]}
            case "$u" in
              s)
                echo "$n"
                ;;
              m)
                echo "$(( n * 60 ))"
                ;;
              h)
                echo "$(( n * 3600 ))"
                ;;
              d)
                echo "$(( n * 86400 ))"
                ;;
              *)
                return 1
                ;;
            esac
          }

          API="https://${REGISTRY}/v2"
          CURL=(curl -sSf --user "${DOCKER_USERNAME}:${DOCKER_PASSWORD}"
                -H "Accept: application/vnd.oci.image.manifest.v1+json,application/vnd.docker.distribution.manifest.v2+json")
          MANIFEST_HEADERS=(-H "Accept: application/vnd.oci.image.manifest.v1+json,application/vnd.docker.distribution.manifest.v2+json")

          now=$(date +%s)
          removed=0
          kept=0
          failed=0

          #
          #  Pull the catalog one page at a time. n=1000 is the registry's
          #  practical upper bound per request; we'll loop with the Link
          #  header if it ever overflows but for our footprint a single
          #  page is enough.
          #
          repos=$("${CURL[@]}" "${API}/_catalog?n=1000" | jq -r '.repositories[]?')

          for repo in $repos; do
            case "$repo" in
              freeradius4-*)
                ;;
              *)
                continue
                ;;
            esac

            tags=$("${CURL[@]}" "${API}/${repo}/tags/list" | jq -r '.tags[]?')
            for tag in $tags; do
              label="${REGISTRY}/${repo}:${tag}"

              #
              #  Fetch the manifest and the digest header in one call.
              #  -D - emits the response headers to stdout ahead of the
              #  body; we split them at the blank line. Docker-Content-
              #  Digest is the by-digest reference needed for DELETE.
              #
              response=$("${CURL[@]}" -D - "${API}/${repo}/manifests/${tag}")
              digest=$(printf '%s\n' "$response" | awk 'BEGIN{IGNORECASE=1} /^docker-content-digest:/ {print $2; exit}' | tr -d '\r')
              manifest=$(printf '%s\n' "$response" | awk 'p {print} /^\r?$/ {p=1}')

              config_digest=$(printf '%s' "$manifest" | jq -r '.config.digest // ""')
              if [ -z "$config_digest" ] || [ "$config_digest" = "null" ]; then
                echo "skip   $label: no config digest in manifest"
                kept=$(( kept + 1 ))
                continue
              fi

              config=$("${CURL[@]}" "${API}/${repo}/blobs/${config_digest}")
              ttl=$(printf '%s' "$config" | jq -r '.config.Labels."ci-ttl" // ""')
              created=$(printf '%s' "$config" | jq -r '.created // ""')

              if [ -z "$ttl" ]; then
                echo "skip   $label: no ci-ttl label"
                kept=$(( kept + 1 ))
                continue
              fi

              if ! ttl_secs=$(ttl_to_seconds "$ttl"); then
                echo "skip   $label: unparseable ci-ttl=$ttl"
                kept=$(( kept + 1 ))
                continue
              fi

              created_trimmed=${created%.*}
              if ! created_secs=$(date -u -d "$created_trimmed" +%s 2>/dev/null); then
                echo "skip   $label: unparseable created=$created"
                kept=$(( kept + 1 ))
                continue
              fi
              age=$(( now - created_secs ))

              if [ "$age" -gt "$ttl_secs" ]; then
                if curl -sSf -X DELETE --user "${DOCKER_USERNAME}:${DOCKER_PASSWORD}" \
                       "${API}/${repo}/manifests/${digest}" >/dev/null 2>&1; then
                  echo "remove $label (age ${age}s > ttl ${ttl_secs}s [ci-ttl=$ttl])"
                  removed=$(( removed + 1 ))
                else
                  echo "FAIL   $label: DELETE rejected (registry config may have storage.delete.enabled=false)"
                  failed=$(( failed + 1 ))
                fi
              else
                echo "keep   $label (age ${age}s <= ttl ${ttl_secs}s [ci-ttl=$ttl])"
                kept=$(( kept + 1 ))
              fi
            done
          done

          echo "summary: removed=$removed kept=$kept failed=$failed"
          [ "$failed" -eq 0 ]
