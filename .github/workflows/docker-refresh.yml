name: Docker CI Image Refresh

on:
  push:
    branches:
      - master
#    paths:
#      - .github/workflows/docker-refresh.yml
#      - scripts/ci/Dockerfile*
  workflow_dispatch:
#  schedule:
#    - cron: '0 1 * * *'

env:
  DOCKER_REGISTRY: "docker.internal.networkradius.com"

jobs:
  process-images:
    timeout-minutes: 20

    runs-on: self-hosted
#    if: github.event_name == 'workflow_dispatch' || github.repository_owner == 'FreeRADIUS'
    if: github.event_name == 'workflow_dispatch'

    strategy:
      fail-fast: false
      matrix:
        os:
          #
          #  Standard CI base image. After building, this entry also
          #  builds and pushes the self-hosted-docker-cli variant
          #  (extends this base with docker CLI + buildx + m4) since
          #  that variant FROMs this image and so needs it in the
          #  local docker daemon's cache before its own build runs.
          #
          - base_image: ubuntu:24.04
            image_name: docker.internal.networkradius.com/self-hosted-ubuntu24
            extra_tags:
              - docker.internal.networkradius.com/self-hosted
            dockerfile: scripts/ci/Dockerfile
            cli_dockerfile: scripts/ci/Dockerfile.docker-cli
            cli_image_name: docker.internal.networkradius.com/self-hosted-docker-cli

          #
          #  Custom dind sidecar image used by the dind-based
          #  workflows (docker.yml, crossbuild.yml, multi-server-tests).
          #  Bakes in registry-mirror -> internal cache and trusts the
          #  internal CA, so per-job apt-installing and daemon.json
          #  wiring goes away.
          #
          - base_image: docker:24-dind
            image_name: docker.internal.networkradius.com/self-hosted-docker-dind
            dockerfile: scripts/ci/Dockerfile.docker-dind
            needs_internal_ca: true

          - base_image: mariadb
          - base_image: postgres
          - base_image: 4teamwork/389ds

    name: "process-images"

    steps:

      - uses: actions/checkout@v6
        with:
          lfs: false

      #
      #  Authenticate the host docker daemon to Docker Hub up-front so
      #  every subsequent `docker pull` (and the implicit FROM-pulls
      #  triggered by `docker build`) uses the higher per-user rate
      #  limit instead of anonymous 100/6h. Without this, refreshing
      #  6+ images in parallel from the same egress IP burns through
      #  the limit and the run fails partway through.
      #
      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_READ_USER }}
          password: ${{ secrets.DOCKERHUB_READ_KEY }}

      - name: Fetch and label image
        shell: bash
        env:
          DOCKER_BASE_IMAGE: ${{ matrix.os.base_image }}
        run: |
          docker pull "$DOCKER_BASE_IMAGE"
          echo "FROM $DOCKER_BASE_IMAGE" | docker build --label preserve=true -t "$DOCKER_REGISTRY/$DOCKER_BASE_IMAGE" -

      - name: Create build dependency package
        if: ${{ matrix.os.image_name && matrix.os.dockerfile }}
        shell: bash
        run: |
          cat > build-dep-pkg.sh << EOF
          apt-get update
          export DEBIAN_FRONTEND=noninteractive
          apt-get install -y --no-install-recommends build-essential devscripts equivs quilt
          cd /work
          debian/rules debian/control
          mk-build-deps debian/control
          mv freeradius-build-deps_*.deb freeradius-build-deps.deb
          mk-build-deps scripts/ci/extra-packages.debian.control
          mv freeradius-build-deps_1*.deb freeradius-build-deps-extra.deb
          chown $(stat -c'%u:%g' .git) *
          EOF
          chmod 755 build-dep-pkg.sh
          docker run \
            -v ${{ github.workspace }}:/work \
            -w /work \
            --rm \
            ${{ matrix.os.base_image }} \
            sh -c './build-dep-pkg.sh'

      #
      #  Stage the internal CA cert into the build context for any
      #  matrix entry that asks for it (currently the dind sidecar
      #  image, which needs to trust docker.internal.networkradius.com).
      #  The cert lives on the self-hosted runner host outside the
      #  repo, so we copy it in just before the build.
      #
      - name: Stage internal CA into build context
        if: ${{ matrix.os.needs_internal_ca }}
        shell: bash
        run: |
          cp /usr/local/share/ca-certificates/networkradius.com.crt \
             scripts/ci/networkradius.com.crt

      - name: Build main Docker image
        if: ${{ matrix.os.image_name && matrix.os.dockerfile }}
        shell: bash
        env:
          DOCKER_IMAGE_NAME: ${{ matrix.os.image_name }}
          DOCKERFILE: ${{ matrix.os.dockerfile }}
        run: |
          docker build --no-cache -f "$DOCKERFILE" -t "$DOCKER_IMAGE_NAME" --label preserve=true .

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_REPO_UPDATE_USERNAME }}
          password: ${{ secrets.DOCKER_REPO_UPDATE_PASSWORD }}
          registry: ${{ env.DOCKER_REGISTRY }}

      - name: Push base image to local registry
        shell: bash
        env:
          DOCKER_BASE_IMAGE: ${{ matrix.os.base_image }}
        run: |
          docker push "$DOCKER_REGISTRY/$DOCKER_BASE_IMAGE"

      - name: Push main image to local registry
        if: ${{ matrix.os.image_name && matrix.os.dockerfile }}
        shell: bash
        env:
          DOCKER_IMAGE_NAME: ${{ matrix.os.image_name }}
          DOCKER_BASE_IMAGE: ${{ matrix.os.base_image }}
        run: |
          docker push "$DOCKER_IMAGE_NAME"

      - name: Create and push alternative tags
        if: ${{ matrix.os.image_name && matrix.os.extra_tags }}
        shell: bash
        env:
          DOCKER_IMAGE_NAME: ${{ matrix.os.image_name }}
          DOCKER_TAGS: ${{ join(matrix.os.extra_tags, ' ') }}
        run: |
          for TAG in $DOCKER_TAGS; do \
            docker image tag "$DOCKER_IMAGE_NAME" "$TAG"; \
            docker push "$TAG"; \
          done

      #
      #  Build the docker-cli variant if this matrix entry declared
      #  one. The CLI Dockerfile FROMs the just-built main image,
      #  which is now in the local docker daemon's cache, so we don't
      #  have to wait on the registry round-trip.
      #
      - name: Build docker-cli variant
        if: ${{ matrix.os.cli_dockerfile && matrix.os.cli_image_name }}
        shell: bash
        env:
          CLI_IMAGE_NAME: ${{ matrix.os.cli_image_name }}
          CLI_DOCKERFILE: ${{ matrix.os.cli_dockerfile }}
        run: |
          docker build --no-cache \
                       -f "$CLI_DOCKERFILE" \
                       -t "$CLI_IMAGE_NAME" \
                       --label preserve=true .

      - name: Push docker-cli variant
        if: ${{ matrix.os.cli_dockerfile && matrix.os.cli_image_name }}
        shell: bash
        env:
          CLI_IMAGE_NAME: ${{ matrix.os.cli_image_name }}
        run: |
          docker push "$CLI_IMAGE_NAME"
