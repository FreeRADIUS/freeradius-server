name: Cleanup Skipped Diagnosis Runs

#
#  Periodically tidy the Actions tab.
#
#  Claude CI Failure Diagnosis fires on every CI completion (the
#  workflow_run event has no conclusion filter) but its job-level if:
#  skips anything that isn't a master/developer-* push failure, so
#  non-failures pile up as "Skipped" entries. Delete those, keep
#  failures and successes (they're useful: failures explain why a
#  diagnosis itself broke, successes pair with the commit comment
#  they posted).
#
#  Cancelled diagnosis runs also pile up: when several CI workflows
#  fail on the same commit, the concurrency group queues their
#  diagnoses and any pending duplicates get cancelled. Those are
#  noise too - the diagnosis was never going to add anything beyond
#  what the run that did execute already posted - so delete them.
#
#  This cleanup workflow's own successful runs are just noise after
#  they've done their job - delete those too. Failures stay so we can
#  see if the cleanup itself has broken.
#

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    if: github.repository == 'FreeRADIUS/freeradius-server'

    permissions:
      actions: write       # required to delete workflow runs

    steps:
      - name: Delete skipped and cancelled Claude CI Failure Diagnosis runs
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          WORKFLOW_ID=$(gh api "/repos/$REPO/actions/workflows" \
            --jq '.workflows[] | select(.name == "Claude CI Failure Diagnosis") | .id')
          if [ -z "$WORKFLOW_ID" ]; then
            echo "Diagnosis workflow not found; nothing to do."
            exit 0
          fi

          for status in skipped cancelled; do
            gh api --paginate \
              "/repos/$REPO/actions/workflows/$WORKFLOW_ID/runs?status=$status&per_page=100" \
              --jq '.workflow_runs[].id' \
              | while read -r id; do
                  [ -z "$id" ] && continue
                  gh api -X DELETE "/repos/$REPO/actions/runs/$id" >/dev/null 2>&1 || \
                    echo "  $id: delete failed"
                done
          done

      - name: Self-clean - delete successful and skipped runs of this workflow
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          SELF_WORKFLOW_ID=$(gh api "/repos/$REPO/actions/workflows" \
            --jq '.workflows[] | select(.name == "Cleanup Skipped Diagnosis Runs") | .id')
          if [ -z "$SELF_WORKFLOW_ID" ]; then
            exit 0
          fi

          # Iterate over the two conclusions we want gone. Failures stay.
          for status in success skipped; do
            gh api --paginate \
              "/repos/$REPO/actions/workflows/$SELF_WORKFLOW_ID/runs?status=$status&per_page=100" \
              --jq '.workflow_runs[].id' \
              | while read -r id; do
                  [ -z "$id" ] && continue
                  # Skip the current run so we don't delete ourselves
                  # mid-flight (its status isn't "completed" yet, but
                  # belt-and-braces).
                  if [ "$id" = "$GITHUB_RUN_ID" ]; then
                    continue
                  fi
                  gh api -X DELETE "/repos/$REPO/actions/runs/$id" >/dev/null 2>&1 || true
                done
          done
