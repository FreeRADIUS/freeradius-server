name: Cleanup Skipped Diagnosis Runs

#
#  Periodically delete completed runs of the Claude CI Failure
#  Diagnosis workflow. That workflow fires on every CI completion
#  (it has to - workflow_run has no event-level conclusion filter)
#  and uses a job-level if: to skip non-master/developer failures,
#  which leaves "Skipped" entries in the Actions tab. We don't keep
#  successful diagnosis runs either - the useful output is the commit
#  comment they posted, which lives on the commit, not the run record.
#
#  Also cleans up its own completed runs on the same pass so the
#  cleanup itself doesn't become the new source of tab clutter.
#

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    if: github.repository == 'FreeRADIUS/freeradius-server'

    permissions:
      actions: write       # required to delete workflow runs

    steps:
      - name: Delete every completed Claude CI Failure Diagnosis run
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          WORKFLOW_ID=$(gh api "/repos/$REPO/actions/workflows" \
            --jq '.workflows[] | select(.name == "Claude CI Failure Diagnosis") | .id')
          if [ -z "$WORKFLOW_ID" ]; then
            echo "Diagnosis workflow not found; nothing to do."
            exit 0
          fi

          gh api --paginate \
            "/repos/$REPO/actions/workflows/$WORKFLOW_ID/runs?status=completed&per_page=100" \
            --jq '.workflow_runs[].id' \
            | while read -r id; do
                [ -z "$id" ] && continue
                gh api -X DELETE "/repos/$REPO/actions/runs/$id" >/dev/null 2>&1 || \
                  echo "  $id: delete failed"
              done

      - name: Self-clean - delete every completed run of this workflow
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          SELF_WORKFLOW_ID=$(gh api "/repos/$REPO/actions/workflows" \
            --jq '.workflows[] | select(.name == "Cleanup Skipped Diagnosis Runs") | .id')
          if [ -z "$SELF_WORKFLOW_ID" ]; then
            exit 0
          fi

          gh api --paginate \
            "/repos/$REPO/actions/workflows/$SELF_WORKFLOW_ID/runs?status=completed&per_page=100" \
            --jq '.workflow_runs[].id' \
            | while read -r id; do
                [ -z "$id" ] && continue
                # Skip the current run so we don't delete ourselves mid-flight.
                if [ "$id" = "$GITHUB_RUN_ID" ]; then
                  continue
                fi
                gh api -X DELETE "/repos/$REPO/actions/runs/$id" >/dev/null 2>&1 || true
              done
