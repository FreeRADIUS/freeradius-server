name: Build Dockerfiles

on:
  push:
    branches-ignore:
      - coverity_scan
  workflow_dispatch:

env:
  CI: 1
  GH_ACTIONS: 1
  DEBIAN_FRONTEND: noninteractive
  APT_OPTS: "-y --no-install-recommends"

jobs:
  #
  #  Generate matrix based on docker directories.
  #
  gen-matrix:

    runs-on: ubuntu-latest

    outputs:
      matrix: ${{ steps.gen-matrix.outputs.matrix }}

    steps:

    - uses: actions/checkout@v6
      with:
        lfs: false

    - id: gen-matrix
      name: Generate matrix based on docker targets
      run: |
        cd scripts/docker/build
        M=$(ls | perl -n -e '{chomp; push @L,"\"$_\""} END{print "{\"env\":[{\"OS\":",join("},{\"OS\":",@L),"}]}"}')
        echo "Matrix: $M"
        echo matrix=$M >> $GITHUB_OUTPUT

  #
  #  Run docker target for each given OS. This will build the
  #  Docker image.
  #
  #  Runs on the self-hosted Proxmox fleet inside an ephemeral DinD
  #  sidecar so the host docker daemon is untouched. Skipped on forks
  #  since it depends on the internal registry and CA cert that only
  #  exist on FreeRADIUS-controlled runners.
  #
  docker:
    needs:
      - gen-matrix

    runs-on: self-hosted
    if: github.repository_owner == 'FreeRADIUS'

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.gen-matrix.outputs.matrix) }}

    env: ${{ matrix.env }}

    name: "v4.0.x-${{ matrix.env.OS }}"

    services:
      dind:
        image: docker:dind
        options: --privileged
        env:
          DOCKER_TLS_CERTDIR: ""
          #  Bypass the squid proxy for internal registry access.
          NO_PROXY: "*.networkradius.com,127.0.0.1"
        #  Mount the host's internal CA so dind trusts
        #  docker.internal.networkradius.com for image pulls,
        #  and share the runner's workspace so the build context
        #  is visible from inside dind.
        volumes:
          - /usr/local/share/ca-certificates/networkradius.com.crt:/etc/docker/certs.d/docker.internal.networkradius.com/ca.crt:ro
          - ${{ github.workspace }}:/workspace

    container:
      image: docker.internal.networkradius.com/self-hosted
      env:
        DOCKER_HOST: tcp://dind:2375
        NO_PROXY: dind,*.networkradius.com,127.0.0.1
      volumes:
        - /usr/local/share/ca-certificates/networkradius.com.crt:/usr/local/share/ca-certificates/networkradius.com.crt:ro
        - ${{ github.workspace }}:/workspace

    defaults:
      run:
        working-directory: /workspace

    steps:

    - uses: actions/checkout@v6
      with:
        fetch-depth: 1
        lfs: false

    - uses: ./.github/actions/setup-dind
      with:
        packages: m4

    - name: Regenerate Dockerfile
      run: |
        rm scripts/docker/build/$OS/Dockerfile || true
        make docker.$OS.regen

    - name: Build docker image
      run: |
        make docker.$OS.build

    #
    #  If the CI has failed and the branch is ci-debug then start a tmate
    #  session. SSH rendezvous point is emited continuously in the job output.
    #
    - name: "Debug: Start tmate"
      uses: mxschmitt/action-tmate@v3
      with:
        limit-access-to-actor: true
      if: ${{ github.ref == 'refs/heads/ci-debug' && failure() }}
